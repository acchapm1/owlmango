# owlmango — Mango theme (Adwaita Pastel Dark)
# Colors use Mango's 0xRRGGBBAA format.

# ── Gaps & borders ───────────────────────────────────────────────────────────
gappih=6
gappiv=6
gappoh=10
gappov=10
borderpx=3
smartgaps=0
no_border_when_single=0

# ── Corner radius / opacity ──────────────────────────────────────────────────
border_radius=8
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# ── Colors (Adwaita Pastel Dark) ─────────────────────────────────────────────
rootcolor=0x1e1e1eff
bordercolor=0x5e5c64ff
focuscolor=0x62a0eaff
urgentcolor=0xed333bff
maximizescreencolor=0x2ec27eff
scratchpadcolor=0x51a1ffff
globalcolor=0xd670e8ff
overlaycolor=0x4fd2fdff
dropcolor=0x2ec27e55
splitcolor=0xf5c211ff

# ── Effects ──────────────────────────────────────────────────────────────────
blur=0
shadows=0
layer_shadows=0

# ── Animations ───────────────────────────────────────────────────────────────
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
animation_duration_open=300
animation_duration_move=350
animation_duration_tag=300
animation_duration_close=350
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1

# ── Master-stack defaults ────────────────────────────────────────────────────
new_is_master=1
default_mfact=0.55
default_nmaster=1

# ── Overview ─────────────────────────────────────────────────────────────────
enable_hotarea=0
ov_tab_mode=0
overviewgappi=6
overviewgappo=30
