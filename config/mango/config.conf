# owlmango — Mango (mangowm) compositor configuration
# Format reference: https://github.com/DreamMaoMao/mango/wiki/
#
# Config is split for readability:
#   theme.conf     — colors, gaps, borders, effects, animations
#   binds.conf     — key/mouse/axis bindings
#   autostart.sh   — launched via exec-once below (Wayle shell, portals, etc.)
#   host.conf      — machine-specific overrides (not tracked in git)

# ── Environment ──────────────────────────────────────────────────────────────
# Set before the compositor initializes. Reset on every config reload.
env=XDG_CURRENT_DESKTOP,mango
env=XDG_SESSION_TYPE,wayland
env=MANGO_INSTANCE_SIGNATURE,owlmango
env=TERMINAL,ghostty
env=GTK_THEME,adw-gtk3-dark
env=QT_QPA_PLATFORM,wayland
env=QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env=QT_QPA_PLATFORMTHEME,gnome
env=QT_STYLE_OVERRIDE,Adwaita-Dark
env=QT_AUTO_SCREEN_SCALE_FACTOR,1
env=QT_ENABLE_HIGHDPI_SCALING,1
env=ELECTRON_OZONE_PLATFORM_HINT,auto
env=ADW_DISABLE_PORTAL,1

# ── Keyboard / input ─────────────────────────────────────────────────────────
repeat_rate=25
repeat_delay=600
numlockon=1
xkb_rules_layout=us

# Trackpad
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1

# Misc behavior
sloppyfocus=1
focus_on_activate=1
warpcursor=1

# ── Tag layouts ──────────────────────────────────────────────────────────────
# layouts: tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# ── Includes ─────────────────────────────────────────────────────────────────
source=~/.config/mango/theme.conf
source=~/.config/mango/binds.conf
source-optional=~/.config/mango/host.conf

# ── Autostart ────────────────────────────────────────────────────────────────
# Runs once when Mango starts. Launches the Wayle shell (bar, notifications,
# OSD, wallpaper), portals, polkit agent, clipboard, and idle/lock daemons.
exec-once=~/.config/mango/autostart.sh
