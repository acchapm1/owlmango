# owlmango — Mango key/mouse/axis bindings
# mod keys: super,ctrl,alt,shift,none
# key names: see `wev` output

# ── Session ──────────────────────────────────────────────────────────────────
bind=SUPER,r,reload_config
bind=CTRL+ALT,Delete,quit
bind=SUPER+SHIFT,p,spawn,~/.config/mango/scripts/power-off-monitors

# ── Launchers ────────────────────────────────────────────────────────────────
bind=SUPER,Return,spawn,ghostty
bind=SUPER,space,spawn,walker
bind=SUPER,b,spawn,zen-browser
bind=SUPER,e,spawn,nautilus
bind=SUPER+ALT,l,spawn,~/.config/mango/scripts/lock
bind=SUPER,l,spawn,~/.config/mango/scripts/lock

# ── Window management ────────────────────────────────────────────────────────
bind=SUPER,q,killclient,
bind=SUPER,t,togglefloating,
bind=SUPER,f,togglefullscreen,
bind=SUPER,a,togglemaximizescreen,
bind=SUPER,g,toggleglobal,
bind=SUPER,i,minimized,
bind=SUPER+SHIFT,i,restore_minimized
bind=SUPER,o,toggleoverview,
bind=SUPER,n,switch_layout

# Focus (arrows + vim keys)
bind=SUPER,Left,focusdir,left
bind=SUPER,h,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,l,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,k,focusdir,up
bind=SUPER,Down,focusdir,down
bind=SUPER,j,focusdir,down
bind=SUPER,Tab,focusstack,next

# Move / swap windows
bind=SUPER+CTRL,Left,exchange_client,left
bind=SUPER+CTRL,h,exchange_client,left
bind=SUPER+CTRL,Right,exchange_client,right
bind=SUPER+CTRL,l,exchange_client,right
bind=SUPER+CTRL,Up,exchange_client,up
bind=SUPER+CTRL,k,exchange_client,up
bind=SUPER+CTRL,Down,exchange_client,down
bind=SUPER+CTRL,j,exchange_client,down

# ── Tags (workspaces) ────────────────────────────────────────────────────────
# view: switch to tag N
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move focused window to tag N (and follow)
bind=SUPER+CTRL,1,tag,1,0
bind=SUPER+CTRL,2,tag,2,0
bind=SUPER+CTRL,3,tag,3,0
bind=SUPER+CTRL,4,tag,4,0
bind=SUPER+CTRL,5,tag,5,0
bind=SUPER+CTRL,6,tag,6,0
bind=SUPER+CTRL,7,tag,7,0
bind=SUPER+CTRL,8,tag,8,0
bind=SUPER+CTRL,9,tag,9,0

# Adjacent tag navigation
bind=SUPER,bracketleft,viewtoleft_have_client,0
bind=SUPER,bracketright,viewtoright_have_client,0

# ── Multi-monitor ────────────────────────────────────────────────────────────
bind=SUPER+SHIFT,Left,focusmon,left
bind=SUPER+SHIFT,Right,focusmon,right
bind=SUPER+SHIFT+CTRL,Left,tagmon,left
bind=SUPER+SHIFT+CTRL,Right,tagmon,right

# ── Sizing ───────────────────────────────────────────────────────────────────
bind=SUPER,minus,setmfact,-0.05
bind=SUPER,equal,setmfact,+0.05
bind=SUPER+SHIFT,r,togglegaps

# ── Media keys ───────────────────────────────────────────────────────────────
# Wayle provides OSD; use wpctl for volume so it works with pipewire.
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioPause,spawn,playerctl play-pause
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set 5%+
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-
bind=NONE,XF86RFKill,spawn,ghostty --class=settings -e impala

# ── Screenshots ──────────────────────────────────────────────────────────────
bind=NONE,Print,spawn,~/.config/mango/scripts/screenshot-picker
bind=SUPER,Print,spawn,grim - | wl-copy
bind=CTRL+SHIFT,1,spawn,~/.config/mango/scripts/screenshot-picker

# ── Mouse ────────────────────────────────────────────────────────────────────
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_middle,togglemaximizescreen,0

# ── Axis (scroll) ────────────────────────────────────────────────────────────
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
